name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Build desktop app
        shell: pwsh
        run: .\build_app.ps1

      - name: Package desktop app
        shell: pwsh
        run: Compress-Archive -Path "dist_app\HPSS Studio\*" -DestinationPath "HPSS-Studio-Windows.zip" -Force

      - name: Compute release tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF -replace "refs/tags/", ""
          } else {
            $date = Get-Date -Format "yyyyMMdd"
            $sha  = $env:GITHUB_SHA.Substring(0, 7)
            $tag  = "dev-$date-$sha"
          }
          "value=$tag" >> $env:GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: HPSS-Studio-Windows.zip
